[aliases]
amend = commit --amend
amend-all = add --all && commit --amend
commit-all = add --all && commit
uncommit = reset --soft HEAD~1
clear = add --all && reset --hard
new = checkout -b
word-diff = diff --word-diff
graph = log --oneline --graph --decorate
rename-branch = branch -m
switch-prev = checkout @{-1}
unstash = stash pop
stash-all = stash push --include-untracked
sync = pull --ff-only origin $CURRENT_BRANCH
done = checkout $MAIN_BRANCH && branch -d $PREVIOUS_BRANCH
home = checkout $MAIN_BRANCH

[history]
size = 5000